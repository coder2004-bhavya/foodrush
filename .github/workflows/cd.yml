# .github/workflows/cd.yml
name: CD — Deploy to Production

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO_BACKEND: foodrush-backend
  ECR_REPO_FRONTEND: foodrush-frontend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Backend ──────────────────────────────────────────────────────
      - name: Build & push backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f backend/Dockerfile \
            --target production \
            -t $ECR_REGISTRY/$ECR_REPO_BACKEND:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO_BACKEND:latest \
            ./backend
          docker push $ECR_REGISTRY/$ECR_REPO_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_BACKEND:latest

      # ── Frontend ─────────────────────────────────────────────────────
      - name: Build & push frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f frontend/Dockerfile \
            --target production \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }} \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            -t $ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO_FRONTEND:latest \
            ./frontend
          docker push $ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_FRONTEND:latest

      # ── EKS Deploy via Helm ──────────────────────────────────────────
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name foodrush-cluster --region ${{ env.AWS_REGION }}

      - name: Deploy backend via Helm
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          helm upgrade --install foodrush-backend ./infra/helm/foodrush \
            --namespace foodrush \
            --create-namespace \
            --set image.backend.repository=$ECR_REGISTRY/$ECR_REPO_BACKEND \
            --set image.backend.tag=$IMAGE_TAG \
            --set image.frontend.repository=$ECR_REGISTRY/$ECR_REPO_FRONTEND \
            --set image.frontend.tag=$IMAGE_TAG \
            -f ./infra/helm/foodrush/values.prod.yaml \
            --wait \
            --timeout 5m

      # ── Smoke test ───────────────────────────────────────────────────
      - name: Smoke test
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PRODUCTION_URL }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Smoke test passed (HTTP $STATUS)"

      # ── Notify ───────────────────────────────────────────────────────
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ FoodRush deployed successfully!\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*URL:* ${{ secrets.PRODUCTION_URL }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ FoodRush deployment FAILED!\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
